<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Bai Jamjuree',sans-serif;background:#fff;color:#000;padding:20px 28px;line-height:1.5;max-width:100%;margin:0 auto}

.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tab{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;border:2px solid #ecedea;background:#fff;cursor:pointer;font-family:'Bai Jamjuree',sans-serif;font-size:14px;font-weight:600;color:#999;transition:all .18s;white-space:nowrap}
.tab:hover{border-color:#80EAFF;color:#0A3D4F;background:#f0fcff}
.tab.active{border-color:#50D0ED;background:linear-gradient(135deg,#80EAFF,#50D0ED);color:#0A3D4F}
.tab-flag{font-size:18px;line-height:1}

.card{background:#f7f7f5;border-radius:10px;padding:22px 24px;margin-bottom:14px;display:none}
.card.visible{display:block}

.card-hero{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.card-flag{font-size:40px;line-height:1;flex-shrink:0}
.card-head{}
.card-country{font-size:22px;font-weight:700;color:#000;line-height:1.2}
.card-type{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#0E7490;background:#E0F7FF;display:inline-block;padding:3px 10px;border-radius:5px;margin-top:5px}

.card-desc{font-size:18px;font-weight:500;color:#333;line-height:1.6;margin-bottom:16px}

.concept-box{border-left:4px solid #80EAFF;background:#fff;border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:18px}
.concept-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#0E7490;margin-bottom:4px}
.concept-text{font-size:16px;font-weight:500;color:#333;line-height:1.5}
.concept-word{font-weight:700;color:#0A3D4F}

.practice-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#666;margin-bottom:10px}
.practice-list{display:flex;flex-direction:column;gap:8px}
.practice-item{display:flex;align-items:flex-start;gap:10px;background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #ecedea}
.practice-dot{width:8px;height:8px;border-radius:50%;background:#80EAFF;flex-shrink:0;margin-top:7px}
.practice-text{font-size:16px;font-weight:500;color:#333;line-height:1.4}

.progress{display:flex;gap:6px;justify-content:center;margin-top:18px}
.progress-dot{width:8px;height:8px;border-radius:50%;background:#ecedea;transition:background .2s}
.progress-dot.active{background:#50D0ED}
</style>
</head>
<body>

<div class="tabs" id="tabs"></div>
<div id="cards"></div>
<div class="progress" id="progress"></div>

<script>
var COUNTRIES=[
  {
    flag:"🇨🇳",country:"China",type:"Directive Hierarchy",
    desc:"Leaders are expected to provide direction and make final decisions.",
    conceptLabel:"Key concept",
    conceptWord:"Guanxi (关系)",
    conceptDef:"networks of trust and reciprocal relationships that often influence how business is conducted and how opportunities are created.",
    practices:[
      "Provide clear expectations.",
      "Don't mistake a lack of debate for a lack of engagement.",
      "Decisions may be made after internal leadership discussions.",
      "Invest in relationships, not only transactions."
    ]
  },
  {
    flag:"🇰🇷",country:"South Korea",type:"Paternalistic Hierarchy",
    desc:"Leaders are often expected to guide, mentor, and take responsibility for their teams.",
    conceptLabel:"Key concept",
    conceptWord:"Nunchi (눈치)",
    conceptDef:"the ability to read the room by observing tone, group dynamics, and unspoken signals.",
    practices:[
      "Senior leaders strongly influence group discussions.",
      "Relationships with managers matter.",
      "Age and tenure may carry authority beyond job title.",
      "Pay attention to what is not being said."
    ]
  },
  {
    flag:"🇻🇳",country:"Vietnam",type:"Consensus-Layered Hierarchy",
    desc:"Decisions often move through several levels before approval.",
    conceptLabel:"Key concept",
    conceptWord:"Quan Hệ",
    conceptDef:"trust built through personal connections, repeated interactions, and long-term relationship building.",
    practices:[
      "Expect multiple stakeholders to be involved.",
      "Patience is often more effective than pressure.",
      "Initial agreement may not represent final approval.",
      "Trust is often built before important commitments are made."
    ]
  },
  {
    flag:"🇯🇵",country:"Japan",type:"Procedural Hierarchy",
    desc:"Consensus is often built before formal meetings take place.",
    conceptLabel:"Key concept",
    conceptWord:"Nemawashi (根回し)",
    conceptDef:"informal alignment and stakeholder consultation before a formal decision is presented.",
    practices:[
      "Prepare stakeholders before major discussions.",
      "Don't assume meetings are the primary decision-making forum.",
      "Expect significant preparation before formal approval.",
      "If people appear surprised in a meeting, alignment may have happened too late."
    ]
  },
  {
    flag:"🇲🇾",country:"Malaysia",type:"Multi-Cultural Hierarchy",
    desc:"Workplaces may include colleagues from Malay, Chinese-Malaysian, and Indian-Malaysian backgrounds.",
    conceptLabel:"Key concept",
    conceptWord:"Cultural plurality",
    conceptDef:"relationship-building often precedes business discussions, and different communities may bring different communication styles and expectations into the same workplace.",
    practices:[
      "Avoid assuming a single communication style.",
      "Build relationships before pushing for decisions.",
      "Adapt to the specific team rather than relying on national stereotypes.",
      "Observe first, then adjust your approach."
    ]
  }
];

var sel=0;

function render(){
  var tabsEl=document.getElementById('tabs');
  var cardsEl=document.getElementById('cards');
  var progEl=document.getElementById('progress');

  tabsEl.innerHTML=COUNTRIES.map(function(c,i){
    return '<button class="tab'+(i===sel?' active':'')+'" data-idx="'+i+'">'+
      '<span class="tab-flag">'+c.flag+'</span>'+c.country+'</button>';
  }).join('');

  cardsEl.innerHTML=COUNTRIES.map(function(c,i){
    return '<div class="card'+(i===sel?' visible':'')+'">'+
      '<div class="card-hero">'+
        '<div class="card-flag">'+c.flag+'</div>'+
        '<div class="card-head">'+
          '<div class="card-country">'+c.country+'</div>'+
          '<div class="card-type">'+c.type+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="card-desc">'+c.desc+'</div>'+
      '<div class="concept-box">'+
        '<div class="concept-label">'+c.conceptLabel+'</div>'+
        '<div class="concept-text"><span class="concept-word">'+c.conceptWord+'</span> — '+c.conceptDef+'</div>'+
      '</div>'+
      '<div class="practice-title">What This Means in Practice</div>'+
      '<div class="practice-list">'+
        c.practices.map(function(p){
          return '<div class="practice-item"><div class="practice-dot"></div><div class="practice-text">'+p+'</div></div>';
        }).join('')+
      '</div>'+
    '</div>';
  }).join('');

  progEl.innerHTML=COUNTRIES.map(function(_,i){
    return '<div class="progress-dot'+(i===sel?' active':'')+'"></div>';
  }).join('');

  tabsEl.querySelectorAll('.tab').forEach(function(el){
    el.addEventListener('click',function(){
      sel=parseInt(el.dataset.idx);
      render();
    });
  });
}

render();
</script>
</body>
</html>
