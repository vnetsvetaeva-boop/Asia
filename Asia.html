<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Bai Jamjuree',sans-serif;background:#fff;color:#000;padding:20px 28px;line-height:1.5;max-width:100%;margin:0 auto}

.header{background:linear-gradient(135deg,#80EAFF 0%,#50D0ED 100%);border-radius:12px;padding:22px 26px 18px;margin-bottom:24px}
.header-eyebrow{font-size:.75rem;font-weight:600;color:rgba(0,60,80,.5);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}
.header-title{font-size:28px;font-weight:700;color:#0A3D4F;line-height:1.2}
.header-sub{font-size:16px;color:rgba(0,60,80,.55);margin-top:6px}

/* Country selector tabs */
.country-tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.country-tab{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;border:2px solid #ecedea;background:#fff;cursor:pointer;font-family:'Bai Jamjuree',sans-serif;font-size:15px;font-weight:600;color:#666;transition:all .2s;user-select:none}
.country-tab:hover{border-color:#80EAFF;background:#f0fbff;color:#0A3D4F}
.country-tab.active{border-color:#50D0ED;background:linear-gradient(135deg,#80EAFF 0%,#50D0ED 100%);color:#0A3D4F;box-shadow:0 2px 12px rgba(80,208,237,.3)}
.flag{font-size:22px;line-height:1}

/* Dimensions grid */
.dimensions{display:flex;flex-direction:column;gap:12px}

.dim-card{background:#f7f7f5;border-radius:10px;overflow:hidden;border:1px solid #ecedea;transition:all .2s}
.dim-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
.dim-header:hover{background:#eaf9ff}
.dim-header:hover .dim-arrow{background:#50D0ED}
.dim-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.dim-label{font-size:16px;font-weight:700;color:#000;flex:1}
.dim-preview{font-size:14px;color:#888;font-weight:500;flex:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dim-arrow{font-size:11px;font-weight:700;color:#0A3D4F;background:#80EAFF;border-radius:20px;padding:4px 10px;transition:transform .25s;flex-shrink:0}
.dim-card.open .dim-arrow{background:#50D0ED}

.dim-body{display:none;padding:0 18px 18px;border-top:1px solid #ecedea}
.dim-card.open .dim-body{display:block}

.dim-content{padding-top:14px}
.concept-term{font-size:20px;font-weight:700;color:#0A3D4F;margin-bottom:6px}
.concept-text{font-size:18px;font-weight:500;color:#333;line-height:1.6}

/* Country color accents */
.tab-china.active{background:linear-gradient(135deg,#FFD6D6 0%,#FF9090 100%);border-color:#FF7070;box-shadow:0 2px 12px rgba(255,112,112,.25)}
.tab-korea.active{background:linear-gradient(135deg,#D6E8FF 0%,#90BFFF 100%);border-color:#6AAEFF;box-shadow:0 2px 12px rgba(106,174,255,.25)}
.tab-vietnam.active{background:linear-gradient(135deg,#FFE8C8 0%,#FFC070 100%);border-color:#FFAA40;box-shadow:0 2px 12px rgba(255,170,64,.25)}
.tab-japan.active{background:linear-gradient(135deg,#FFD6E8 0%,#FF90BB 100%);border-color:#FF6699;box-shadow:0 2px 12px rgba(255,102,153,.25)}
.tab-malaysia.active{background:linear-gradient(135deg,#D8FFD6 0%,#80E878 100%);border-color:#5DCC55;box-shadow:0 2px 12px rgba(93,204,85,.25)}

.accent-china{border-left:4px solid #FF7070}
.accent-korea{border-left:4px solid #6AAEFF}
.accent-vietnam{border-left:4px solid #FFAA40}
.accent-japan{border-left:4px solid #FF6699}
.accent-malaysia{border-left:4px solid #5DCC55}

.dim-card.accent-china .dim-header:hover,.dim-card.accent-china.open .dim-header{background:rgba(255,112,112,.06)}
.dim-card.accent-korea .dim-header:hover,.dim-card.accent-korea.open .dim-header{background:rgba(106,174,255,.06)}
.dim-card.accent-vietnam .dim-header:hover,.dim-card.accent-vietnam.open .dim-header{background:rgba(255,170,64,.06)}
.dim-card.accent-japan .dim-header:hover,.dim-card.accent-japan.open .dim-header{background:rgba(255,102,153,.06)}
.dim-card.accent-malaysia .dim-header:hover,.dim-card.accent-malaysia.open .dim-header{background:rgba(93,204,85,.06)}

</style>
</head>
<body>

<div class="country-tabs" id="tabs"></div>
<div style="font-size:13px;color:#aaa;font-weight:500;margin-bottom:14px;padding-left:2px">👆 Click any row to explore</div>
<div class="dimensions" id="dims"></div>

<script>
var DATA = {
  china: {
    name: "China", flag: "🇨🇳", accent: "accent-china",
    dims: [
      { icon: "🤝", label: "Core relationship concept",
        term: "Guanxi (关系)",
        text: "Cultivated personal networks built on reciprocity and trust. Relationships precede business — investing in Guanxi is investing in long-term access and cooperation." },
      { icon: "⚖️", label: "Decision-making style",
        term: "Top-down",
        text: "Senior leader decides after internal deliberation. Speed matters — expect pragmatic shortcuts once a relationship is established." },
      { icon: "🎭", label: "Key cultural concept",
        term: "Mianzi (面子) — Face",
        text: "Face is social currency. Losing face is devastating and can permanently damage a relationship. Always give your counterpart a way to preserve dignity, especially in front of others." },
      { icon: "💼", label: "Work culture ethos",
        term: "Results-oriented & speed-focused",
        text: "Cost-conscious, pragmatic shortcuts are common. Output is prized. Visible dedication matters, but outcomes matter more." }
    ]
  },
  korea: {
    name: "South Korea", flag: "🇰🇷", accent: "accent-korea",
    dims: [
      { icon: "🤝", label: "Core relationship concept",
        term: "Inhwa (인화) + Jeong (정)",
        text: "Inhwa — harmony within the group. Jeong — deep emotional bonds formed over time. Relationships deepen gradually and carry strong obligations once established." },
      { icon: "⚖️", label: "Decision-making style",
        term: "Consensus-driven but hierarchical",
        text: "Extensive internal alignment happens before the senior leader approves. The process is thorough — don't mistake silence for disagreement." },
      { icon: "🎭", label: "Key cultural concept",
        term: "Nunchi (눈치) + Kibun (기분)",
        text: "Nunchi — the subtle art of reading the room. Kibun — a person's emotional state and dignity. Skilled communicators sense mood shifts and adjust accordingly." },
      { icon: "💼", label: "Work culture ethos",
        term: "Long hours & visible dedication",
        text: "Loyalty and appearance of diligence matter as much as output. Staying late signals commitment. Hierarchy shapes every interaction, from seating to speaking order." }
    ]
  },
  vietnam: {
    name: "Vietnam", flag: "🇻🇳", accent: "accent-vietnam",
    dims: [
      { icon: "🤝", label: "Core relationship concept",
        term: "Quan he — relationship-based trust",
        text: "Trust is built through shared meals and repeated contact. Business relationships are personal investments — warmth and social time come before formal negotiation." },
      { icon: "⚖️", label: "Decision-making style",
        term: "Consensus-driven, multi-level approval",
        text: "Patient, methodical, and relationship-dependent. Decisions ripple through multiple levels. Rushing signals disrespect — allow time for thorough internal consultation." },
      { icon: "🎭", label: "Key cultural concept",
        term: "Saving face — modesty above all",
        text: "Less formalized than China but equally powerful. Strong emphasis on modesty and humility. Direct criticism in public settings can derail an entire relationship." },
      { icon: "💼", label: "Work culture ethos",
        term: "Relationship-first; business is personal",
        text: "Trust is built slowly through social engagement. Expect time investment in meals, small talk, and personal connection before serious business begins." }
    ]
  },
  japan: {
    name: "Japan", flag: "🇯🇵", accent: "accent-japan",
    dims: [
      { icon: "🤝", label: "Core relationship concept",
        term: "Wa (和) — Harmony",
        text: "Harmony as the governing principle of all group interaction. Consensus and group cohesion take precedence over individual opinion or speed." },
      { icon: "⚖️", label: "Decision-making style",
        term: "Nemawashi + Ringi",
        text: "Nemawashi — informal groundwork laid before any formal proposal. Ringi — formal bottom-up approval system. Meetings confirm decisions already made behind the scenes." },
      { icon: "🎭", label: "Key cultural concept",
        term: "Honne (本音) vs Tatemae (建前)",
        text: "Honne — true feelings. Tatemae — public stance. Real opinions surface only in private, after trust is built. A polite 'yes' often means 'I understand,' not 'I agree.'" },
      { icon: "💼", label: "Work culture ethos",
        term: "Process-oriented; Kaizen mindset",
        text: "Continuous improvement (Kaizen) is embedded in daily work. Quality of execution matters deeply. Precision and reliability are core expectations." }
    ]
  },
  malaysia: {
    name: "Malaysia", flag: "🇲🇾", accent: "accent-malaysia",
    dims: [
      { icon: "🤝", label: "Core relationship concept",
        term: "Multi-layered cultural identity",
        text: "Three distinct cultural lenses: Malay (Islamic values, community), Chinese-Malaysian (Confucian, efficiency-driven), Indian-Malaysian (expressive, relationship-oriented). Adapt your approach accordingly." },
      { icon: "⚖️", label: "Decision-making style",
        term: "Senior leader decides after consensus",
        text: "'Rubber time' — the process can be slow and non-linear. Building consensus is essential but pace is unpredictable. Patience is a competitive advantage here." },
      { icon: "🎭", label: "Key cultural concept",
        term: "Saving face — across three cultures",
        text: "Face-saving applies across all three ethnic communities but manifests differently. Add a fatalistic outlook in some contexts — outcomes are accepted with equanimity." },
      { icon: "💼", label: "Work culture ethos",
        term: "Group-oriented & paternalistic",
        text: "Religious observance is integrated into the workday — prayer times, fasting periods, and festivals shape scheduling. Show respect for this and plan your meetings accordingly." }
    ]
  }
};

var activeCountry = 'china';
var openDims = {};

function getAccentStyle(country) {
  return DATA[country].accent;
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = Object.keys(DATA).map(function(k) {
    var d = DATA[k];
    var cls = 'country-tab tab-' + k + (k === activeCountry ? ' active' : '');
    return '<button class="' + cls + '" data-country="' + k + '">' +
      '<span class="flag">' + d.flag + '</span>' + d.name +
    '</button>';
  }).join('');
  el.querySelectorAll('.country-tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeCountry = btn.dataset.country;
      openDims = {};
      renderTabs();
      renderDims();
    });
  });
}

function renderDims() {
  var el = document.getElementById('dims');
  var country = DATA[activeCountry];
  el.innerHTML = country.dims.map(function(d, i) {
    var isOpen = !!openDims[i];
    var cardCls = 'dim-card ' + country.accent + (isOpen ? ' open' : '');
    return '<div class="' + cardCls + '" data-idx="' + i + '">' +
      '<div class="dim-header">' +
        '<span class="dim-icon">' + d.icon + '</span>' +
        '<span class="dim-label">' + d.label + '</span>' +
        '<span class="dim-preview">' + (isOpen ? '' : d.term) + '</span>' +
        '<span class="dim-arrow">' + (isOpen ? '▲ hide' : '▼ open') + '</span>' +
      '</div>' +
      '<div class="dim-body">' +
        '<div class="dim-content">' +
          '<div class="concept-term">' + d.term + '</div>' +
          '<div class="concept-text">' + d.text + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  el.querySelectorAll('.dim-card').forEach(function(card) {
    card.querySelector('.dim-header').addEventListener('click', function() {
      var idx = parseInt(card.dataset.idx);
      openDims[idx] = !openDims[idx];
      renderDims();
    });
  });
}

renderTabs();
renderDims();
</script>
</body>
</html>
